{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <h2 style="text-align:center; margin-bottom: 10px;">Recuperar contraseña</h2>
    <p style="text-align:center; font-size: 0.9rem; margin-bottom: 20px;">
      Ingresa el correo asociado a tu cuenta.<br>
      Te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Correo electrónico" required>
      </div>

      <button type="submit">Enviar enlace</button>

      <div style="margin-top: 10px; text-align: center;">
        <a href="{% url 'login' %}">Volver al login</a>
      </div>
    </form>
  </div>
</body>
</html>
