{% extends 'base.html' %}

{% block content %}
<div class="container-fluid p-0 m-0" style="max-width: 100vw; overflow-x: hidden;">

    <!-- Título -->
    <div class="text-center" style="font-size: 0.85rem; padding: 4px 0;">
        <strong>Dashboard Financiero</strong>
    </div>

    <!-- Pestañas -->
    <ul class="nav nav-tabs justify-content-center" id="biTabs" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" id="bi-2025-tab" data-toggle="tab" href="#bi-2025" role="tab">
                📊 2025
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="bi-2026-tab" data-toggle="tab" href="#bi-2026" role="tab">
                📈 2026
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="bi-2027-tab" data-toggle="tab" href="#bi-2027" role="tab">
                ⏳ 2027
            </a>
        </li>
    </ul>

    <!-- Contenido de pestañas -->
    <div class="tab-content" id="biTabsContent" style="height: calc(100vh - 140px);">

        <!-- Power BI 2025 -->
        <div class="tab-pane fade show active h-100" id="bi-2025" role="tabpanel">
            <iframe
                title="BI_Financiero_2025"
                src="https://app.powerbi.com/view?r=eyJrIjoiZGNlOWU0ZmEtZjI1Yi00NDRlLThhZDEtNDYzOTQyZmE3YTNmIiwidCI6IjM4MDE5MDM1LTI1NzUtNGE3MS1hNjY1LTdlYjcxNWUyOTY1ZSJ9"
                style="border:0; width:100%; height:100%;"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Power BI 2026 (lazy load) -->
        <div class="tab-pane fade h-100" id="bi-2026" role="tabpanel">
            <iframe
                id="iframe-2026"
                title="BI_Financiero_2026"
                data-src="https://app.powerbi.com/view?r=eyJrIjoiNDY2ZmU3ZWEtOGEzMC00ZTVlLThjNGEtNDJkMDU4YmRlMzYyIiwidCI6IjM4MDE5MDM1LTI1NzUtNGE3MS1hNjY1LTdlYjcxNWUyOTY1ZSJ9"
                style="border:0; width:100%; height:100%;"
                allowfullscreen>
            </iframe>
        </div>

        <!-- 2027 Countdown -->
        <div class="tab-pane fade h-100" id="bi-2027" role="tabpanel">
            <div class="d-flex flex-column justify-content-center align-items-center h-100 text-center" style="padding: 20px;">
                <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 10px;">
                    Dashboard 2027
                </div>

                <div style="opacity: .75; margin-bottom: 18px;">
                    Disponible en:
                </div>

                <div id="countdown-2027" style="
                    font-size: 2rem;
                    font-weight: 800;
                    letter-spacing: 1px;
                    padding: 14px 22px;
                    border-radius: 12px;
                    background: rgba(0,0,0,.06);
                    min-width: 320px;
                ">
                    --d --:--:--
                </div>

                <div id="countdown-msg-2027" style="margin-top: 14px; opacity: .7;">
                    Preparando información...
                </div>

                <!-- Si después tendrás BI 2027, aquí lo dejas listo:
                <div class="mt-3 w-100 h-100" style="display:none" id="wrap-iframe-2027">
                    <iframe
                        id="iframe-2027"
                        title="BI_Financiero_2027"
                        data-src="https://app.powerbi.com/view?r=URL_2027"
                        style="border:0; width:100%; height:100%;"
                        allowfullscreen>
                    </iframe>
                </div>
                -->
            </div>
        </div>

    </div>
</div>

<script>
  // ✅ Lazy load para iframes en tabs (ej: 2026)
  $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
    const target = $(e.target).attr('href');
    const $iframe = $(target).find('iframe');

    if ($iframe.length) {
      const src = $iframe.attr('src');
      const dataSrc = $iframe.data('src');

      if (!src && dataSrc) {
        $iframe.attr('src', dataSrc);
      }
    }

    // Si abren 2027, arranca el countdown (solo una vez)
    if (target === '#bi-2027' && !window.__countdown2027Started) {
      window.__countdown2027Started = true;
      startCountdown2027();
    }
  });

  function startCountdown2027() {
    // 🎯 Cambia esta fecha/hora si quieres otra
    // (Formato: new Date(año, mesIndex, día, hora, min, seg))
    const targetDate = new Date(2027, 0, 1, 0, 0, 0); // 1 Ene 2027 00:00

    const $cd = document.getElementById('countdown-2027');
    const $msg = document.getElementById('countdown-msg-2027');

    function pad(n){ return String(n).padStart(2,'0'); }

    function tick() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        $cd.textContent = "00d 00:00:00";
        $msg.textContent = "✅ Ya disponible (cuando tengas el BI 2027 lo conectamos aquí).";
        clearInterval(timer);
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      $cd.textContent = `${days}d ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      $msg.textContent = "⏳ En preparación...";
    }

    tick();
    const timer = setInterval(tick, 1000);
  }
</script>

{% endblock %}
